<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk SPBU Pertamina</title>
    <style>
        body { font-family: sans-serif; background: #eef1f5; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #003399; margin-top: 0; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; min-height: 60px; }
        button { width: 100%; padding: 14px; background: #003399; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .receipt-preview { 
            background: #fff; padding: 10px; margin-top: 20px; border: 1px solid #ddd; width: 300px; 
            font-size: 20px; font-weight: 400; color: #000; line-height: 1.1;
            font-family: 'Courier New', Courier, monospace;
        }
        .center { text-align: center; }
        .bold { font-weight: bold; }
        .line { border: none; border-top: 2px dashed #000; margin: 8px 0; }
        .logo-img { width: 120px; display: block; margin: 0 auto 5px auto; }
        .item-row { display: flex; }
        .item-label { width: 140px; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Input Data Struk</h2>
    <div class="form-group"><label>Nomor Kode</label><input type="text" id="in_kode" value="54.631.10"></div>
    <div class="form-group"><label>Nama SPBU</label><input type="text" id="in_spbu" value="SPBU DS. PELEM"></div>
    <div class="form-group"><label>Alamat</label><input type="text" id="in_alamat" value="JALAN PELANDUAN NO.12"></div>
    <div class="flex-row" style="display:flex; gap:10px;">
        <div class="form-group" style="flex:1"><label>Shift</label><input type="text" id="in_shift" value="2"></div>
        <div class="form-group" style="flex:1"><label>No. Trans</label><input type="text" id="in_trans" value="003844"></div>
    </div>
    <div class="form-group"><label>Waktu</label><input type="text" id="in_waktu" placeholder="DD/MM/YYYY HH:MM:SS"></div>
    <div class="form-group"><label>Nama Produk</label><input type="text" id="in_produk" value="PERTALITE"></div>
    <div class="form-group"><label>Pompa</label><input type="text" id="in_pompa" value="1/2"></div>
    <div class="form-group"><label>Harga/Liter (Rp)</label><input type="text" id="in_harga" value="10000"></div>
    <div class="form-group"><label>Volume</label><input type="text" id="in_vol" value="1.50"></div>
    <div class="form-group"><label>Total Harga (Rp)</label><input type="text" id="in_total" value="15000"></div>
    <div class="form-group"><label>No. Plat</label><input type="text" id="in_plat" value="B 1234 CD"></div>
    <div class="form-group"><label>Catatan</label><textarea id="in_note"></textarea></div>
    <button onclick="cetakRaw()">CETAK LANGSUNG (RAW)</button>
</div>

<script>
    function formatRibuan(n) { return Number(n).toLocaleString('id-ID'); }
    function cetakRaw() {
        var spbu = document.getElementById('in_kode').value;
        var nama = document.getElementById('in_spbu').value;
        var alamat = document.getElementById('in_alamat').value;
        var shift = document.getElementById('in_shift').value;
        var trans = document.getElementById('in_trans').value;
        var waktu = document.getElementById('in_waktu').value || new Date().toLocaleString('id-ID');
        var pompa = document.getElementById('in_pompa').value;
        var produk = document.getElementById('in_produk').value;
        var harga = document.getElementById('in_harga').value;
        var vol = document.getElementById('in_vol').value;
        var total = document.getElementById('in_total').value;
        var plat = document.getElementById('in_plat').value;
        var note = document.getElementById('in_note').value;
        
        var W = 32;
        var garis = '--------------------------------';
        var s = '\x1b\x40'; 
        s += '<img>https://ariosetyoanggoro-art.github.io/cetak-thermal-ario/logo-pertamina.png</img>\n';
        
        var spNomor = Math.floor((W - spbu.length) / 2);
        s += new Array(spNomor + 1).join(' ') + '\x1b\x45\x01' + spbu + '\x1b\x45\x00\n';
        s += center(nama, W) + '\n';
        s += center(alamat, W) + '\n';
        s += 'Shift : ' + shift + '   No. Trans : ' + trans + '\n';
        s += 'Waktu : ' + waktu + '\n';
        s += garis + '\n';
        s += rowKolom('Pulau/Pompa', pompa, W) + '\n';
        s += rowKolom('Nama Produk', produk, W) + '\n';
        s += rowKolom('Harga/Liter', 'Rp.' + harga, W) + '\n';
        s += rowKolom('Volume', '(L) ' + vol, W) + '\n';
        s += rowKolom('Total Harga', 'Rp.' + total, W) + '\n';
        s += rowKolom('Operator', 'BAMBANG', W) + '\n';
        s += garis + '\n';
        s += 'CASH' + '\n';
        var totalStr = total.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        s += new Array(W - totalStr.length + 1).join(' ') + totalStr + '\n\n';
        s += garis + '\n';
        s += 'No. Plat : ' + plat + '\n';
        s += garis + '\n';
        if (note) s += note + '\n';
        s += '\n\n\n';

        window.location.href = 'rawbt:base64,' + btoa(unescape(encodeURIComponent(s)));
    }
    function center(txt, W) {
        var sp = Math.floor((W - txt.length) / 2);
        return new Array(sp + 1).join(' ') + txt;
    }
    function rowKolom(label, value, W) {
        var res = label + ': ' + value;
        return res;
    }
</script>
</body>
</html>
