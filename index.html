<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Struk SPBU Pertamina</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .receipt-preview { width: 100% !important; border: none !important; margin: 0 !important; padding: 0 !important; }
        }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 350px; box-sizing: border-box; }
        h2 { text-align: center; color: #003399; margin: 0 0 10px 0; font-size: 16px; }
        .form-group { margin-bottom: 6px; }
        label { display: block; font-size: 11px; color: #666; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #003399; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-raw { background: #d9534f; margin-top: 5px; }

        .receipt-preview { 
            background: #fff; padding: 5px; margin-top: 20px; border: 1px solid #ddd; width: 300px; 
            font-size: 16px; font-weight: 400; color: #000; line-height: 1.1;
            font-family: 'DotGothic16', sans-serif;
        }
        .center { text-align: center; }
        .bold { font-weight: bold; font-size: 0.9em; border-bottom: 1px solid transparent; }
        .line { border-top: 1px dashed #000; border-bottom: none; border-left: none; border-right: none; margin: 8px 0; height: 0; letter-spacing: 2px; }
        .logo-img { width: 120px; display: block; margin: 0 auto 5px auto; }
        .item-row { display: flex; }
        .item-label { width: 140px; flex-shrink: 0; }
    </style>
</head>
<body>

<div class="container no-print">
    <h2>Form Struk SPBU</h2>
    <div class="form-group">
        <label>Nomor Kode (Hanya Muncul di Bawah Logo)</label>
        <input type="text" id="in_kode" value="54.631.10" oninput="updatePreview()" placeholder="Contoh: 54.631.10">
    </div>
    <div class="form-group">
        <label>Nama SPBU / Stasiun</label>
        <input type="text" id="in_spbu" value="SPBU DS. PELEM" oninput="updatePreview()" placeholder="Contoh: SPBU DS. PELEM">
    </div>
    <div class="form-group">
        <label>Alamat Lengkap SPBU</label>
        <input type="text" id="in_alamat" value="JALAN PELANDUAN NO.12" oninput="updatePreview()" placeholder="Contoh: JALAN PELANDUAN NO.12">
    </div>
    <div class="flex-row" style="display:flex; gap:10px;">
        <div class="form-group" style="flex:1">
            <label>Shift (1-3)</label>
            <input type="text" id="in_shift" value="2" oninput="updatePreview()" placeholder="2">
        </div>
        <div class="form-group" style="flex:1">
            <label>Nomor Transaksi</label>
            <input type="text" id="in_trans" value="003844" oninput="updatePreview()" placeholder="003844">
        </div>
    </div>
    <div class="form-group">
        <label>Waktu Transaksi</label>
        <input type="text" id="in_waktu" oninput="updatePreview()" placeholder="DD/MM/YYYY HH:MM:SS">
    </div>
    <div class="form-group">
        <label>Nama Produk BBM</label>
        <input type="text" id="in_produk" value="PERTALITE" oninput="updatePreview()" placeholder="PERTALITE / PERTAMAX">
    </div>
    <div class="form-group">
        <label>Nomor Pulau / Pompa</label>
        <input type="text" id="in_pompa" value="1/2" oninput="updatePreview()" placeholder="1/2">
    </div>
    <div class="form-group">
        <label>Harga Per Liter (Rp)</label>
        <input type="text" id="in_harga" value="10000" oninput="updatePreview()" placeholder="10000">
    </div>
    <div class="form-group">
        <label>Volume / Jumlah Liter</label>
        <input type="text" id="in_vol" value="1.50" oninput="updatePreview()" placeholder="1.50">
    </div>
    <div class="form-group">
        <label>Nomor Plat Kendaraan</label>
        <input type="text" id="in_plat" value="B 1234 CD" oninput="updatePreview()" placeholder="B 1234 CD">
    </div>
    <div class="form-group">
        <label>Keterangan Tambahan / Catatan</label>
        <textarea id="in_note" placeholder="Tambahkan catatan khusus di sini..." oninput="updatePreview()"></textarea>
    </div>
    
    <button onclick="window.print()">CETAK STRUK (HTML/PREVIEW)</button>
    <button class="btn-raw" onclick="cetakRaw()">CETAK LANGSUNG (RAW)</button>
</div>

<div class="receipt-preview" id="receipt">
    <img class="logo-img" src="logo-pertamina.png" alt="Logo">
    <div class="center bold" id="out_kode"></div>
    <div class="center" id="out_spbu"></div>
    <div class="center" id="out_alamat"></div>
    <div style="margin-top:5px;">
        <span>Shift: <span id="out_shift"></span></span>
        <span style="float:right;">No.Trans: <span id="out_trans"></span></span>
    </div>
    <div id="out_waktu"></div>
    <div class="line"></div>
    <div class="item-row"><span class="item-label">Pulau/Pompa</span>: <span id="out_pompa"></span></div>
    <div class="item-row"><span class="item-label">Nama Produk</span>: <span id="out_produk"></span></div>
    <div class="item-row"><span class="item-label">Harga/Liter</span>: Rp.<span id="out_harga"></span></div>
    <div class="item-row"><span class="item-label">Volume</span>: <span id="out_vol"></span></div>
    <div class="item-row"><span class="item-label">Total Harga</span>: Rp.<span id="out_total"></span></div>
    <div class="item-row"><span class="item-label">Operator</span>: BAMBANG</div>
    <div class="line"></div>
    <div class="flex">
        <span>CASH</span>
    </div>
    <div style="text-align:right;">
        <span id="out_cash_total"></span>
    </div>
    
    <div class="line"></div>
    <div id="out_plat"></div>
    <div class="line"></div>
    <div id="out_note" style="white-space: pre-wrap;"></div>
</div>

<script>
    function formatRibuan(n) { return Number(n).toLocaleString('id-ID'); }
    function updatePreview() {
        document.getElementById('out_kode').innerText = document.getElementById('in_kode').value;
        document.getElementById('out_spbu').innerText = document.getElementById('in_spbu').value;
        document.getElementById('out_alamat').innerText = document.getElementById('in_alamat').value;
        document.getElementById('out_shift').innerText = document.getElementById('in_shift').value;
        document.getElementById('out_trans').innerText = document.getElementById('in_trans').value;
        document.getElementById('out_waktu').innerText = "Waktu : " + (document.getElementById('in_waktu').value || new Date().toLocaleString());
        document.getElementById('out_pompa').innerText = document.getElementById('in_pompa').value;
        document.getElementById('out_produk').innerText = document.getElementById('in_produk').value;
        let h = parseFloat(document.getElementById('in_harga').value || 0);
        let v = parseFloat(document.getElementById('in_vol').value || 0);
        let total = h * v;
        document.getElementById('out_harga').innerText = formatRibuan(h);
        document.getElementById('out_vol').innerText = v;
        document.getElementById('out_total').innerText = formatRibuan(total);
        document.getElementById('out_cash_total').innerText = formatRibuan(total);
        document.getElementById('out_plat').innerText = "No. Plat : " + document.getElementById('in_plat').value;
        document.getElementById('out_note').innerText = document.getElementById('in_note').value;
    }

    function cetakRaw() {
        var spbu = document.getElementById('in_kode').value;
        var nama = document.getElementById('in_spbu').value;
        var alamat = document.getElementById('in_alamat').value;
        var total = document.getElementById('in_harga').value * document.getElementById('in_vol').value;
        
        var W = 32;

        function center(txt) {
            if (txt.length >= W) return txt;
            var sp = Math.floor((W - txt.length) / 2);
            return new Array(sp + 1).join(' ') + txt;
        }

        function row(left, right) {
            var space = W - (left.length + right.length);
            return left + new Array(Math.max(1, space) + 1).join(' ') + right;
        }

        function rowKolom(label, value) {
            while (label.length < 14) { label = label + ' '; }
            return label + ': ' + value;
        }

        function formatRp(n) {
            return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        // Initialize Printer and Reset Bold
        var s = '\x1b\x40'; 
        
        // Logo (RawBT tag)
        s += '<img>https://ariosetyoanggoro-art.github.io/cetak-thermal-ario/logo-pertamina.png</img>\n';
        
        // Nomor SPBU (Hanya ini yang BOLD)
        var spNomor = Math.floor((W - spbu.length) / 2);
        s += new Array(spNomor + 1).join(' ') + '\x1b\x45\x01' + spbu + '\x1b\x45\x00\n';
        
        s += center(nama) + '\n';
        s += center(alamat) + '\n';
        s += 'Shift : ' + document.getElementById('in_shift').value + '   No.Trans: ' + document.getElementById('in_trans').value + '\n';
        s += 'Waktu : ' + (document.getElementById('in_waktu').value || new Date().toLocaleString()) + '\n';
        s += '--------------------------------\n';
        s += rowKolom('Pulau/Pompa', document.getElementById('in_pompa').value) + '\n';
        s += rowKolom('Nama Produk', document.getElementById('in_produk').value) + '\n';
        s += rowKolom('Harga/Liter', 'Rp.' + formatRp(document.getElementById('in_harga').value)) + '\n';
        s += rowKolom('Volume', document.getElementById('in_vol').value) + '\n';
        s += rowKolom('Total Harga', 'Rp.' + formatRp(total)) + '\n';
        s += rowKolom('Operator', 'BAMBANG') + '\n';
        s += '--------------------------------\n';
        s += row('CASH', 'Rp.' + formatRp(total)) + '\n';
        s += '\n';
        s += '--------------------------------\n';
        s += 'No. Plat : ' + document.getElementById('in_plat').value + '\n';
        s += '--------------------------------\n';
        
        var note = document.getElementById('in_note').value;
        if (note) {
            s += note + '\n';
        }
        s += '\n\n\n';

        window.location.href = 'rawbt:base64,' + btoa(unescape(encodeURIComponent(s)));
    }

    window.onload = updatePreview;
</script>
</body>
</html>
