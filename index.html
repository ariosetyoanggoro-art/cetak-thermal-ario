<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Struk SPBU Pertamina</title>
    <style>
        body { font-family: sans-serif; background: #eef1f5; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #003399; margin-top: 0; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 14px; color: #555; margin-bottom: 4px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        textarea { resize: vertical; min-height: 60px; font-family: sans-serif; }
        button { width: 100%; padding: 14px; background: #003399; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        button:active { background: #002266; }
        .flex-row { display: flex; gap: 10px; }
        .flex-row .form-group { flex: 1; }
        .separator { border-top: 1px dashed #ccc; margin: 12px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Struk SPBU Pertamina</h2>

    <div class="form-group">
        <label>Nomor SPBU (Bold)</label>
        <input type="text" id="nomor_spbu" value="54.631.10">
    </div>
    <div class="form-group">
        <label>Nama SPBU</label>
        <input type="text" id="nama_spbu" value="SPBU DS.PELEM">
    </div>
    <div class="form-group">
        <label>Alamat</label>
        <input type="text" id="alamat" value="JL. RAYA PELEM NO. 12">
    </div>

    <div class="separator"></div>

    <div class="flex-row">
        <div class="form-group">
            <label>Shift</label>
            <input type="text" id="shift" value="2">
        </div>
        <div class="form-group">
            <label>No. Trans</label>
            <input type="text" id="no_trans" value="003844">
        </div>
    </div>
    <div class="form-group">
        <label>Waktu (kosongkan = otomatis)</label>
        <input type="text" id="waktu" placeholder="01/06/2025 14:30:00">
    </div>

    <div class="separator"></div>

    <div class="form-group">
        <label>Pulau/Pompa</label>
        <input type="text" id="pompa" value="1/2">
    </div>
    <div class="form-group">
        <label>Nama Produk</label>
        <input type="text" id="produk" value="PERTALITE">
    </div>
    <div class="form-group">
        <label>Harga/Liter (Rp)</label>
        <input type="number" id="harga" value="10000">
    </div>
    <div class="form-group">
        <label>Volume</label>
        <input type="text" id="volume" value="1.50">
    </div>
    <div class="form-group">
        <label>Total Harga (Rp)</label>
        <input type="number" id="total" value="15000">
    </div>
    <div class="form-group">
        <label>Operator</label>
        <input type="text" id="operator" value="BAMBANG">
    </div>

    <div class="separator"></div>

    <div class="form-group">
        <label>No. Plat</label>
        <input type="text" id="no_plat" value="B 1234 CD">
    </div>
    <div class="form-group">
        <label>Catatan</label>
        <textarea id="catatan" placeholder="Isi catatan di sini..."></textarea>
    </div>

    <button onclick="cetak()">CETAK STRUK</button>
</div>

<script>
    // Auto-fill waktu
    (function() {
        var w = document.getElementById('waktu');
        if (!w.value) {
            var d = new Date();
            var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
            w.value = pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + d.getFullYear() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }
    })();

    function cetak() {
        var nomor_spbu = document.getElementById('nomor_spbu').value;
        var nama_spbu = document.getElementById('nama_spbu').value;
        var alamat = document.getElementById('alamat').value;
        var shift = document.getElementById('shift').value;
        var no_trans = document.getElementById('no_trans').value;
        var waktu = document.getElementById('waktu').value;
        var pompa = document.getElementById('pompa').value;
        var produk = document.getElementById('produk').value;
        var harga = parseInt(document.getElementById('harga').value || 0);
        var volume = document.getElementById('volume').value;
        var total = parseInt(document.getElementById('total').value || 0);
        var operator = document.getElementById('operator').value;
        var no_plat = document.getElementById('no_plat').value;
        var catatan = document.getElementById('catatan').value;

        if (!waktu) {
            var d = new Date();
            var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
            waktu = pad(d.getDate()) + '/' + pad(d.getMonth()+1) + '/' + d.getFullYear() + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
        }

        var W = 32;

        function center(txt) {
            if (txt.length >= W) return txt;
            var sp = Math.floor((W - txt.length) / 2);
            return new Array(sp + 1).join(' ') + txt;
        }

        function rowKolom(label, value) {
            while (label.length < 14) { label = label + ' '; }
            return label + ': ' + value;
        }

        function formatRp(n) {
            return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
        }

        var garis = '--------------------------------';
        var s = '';

        // Logo Pertamina sebagai teks (format image via RawBT)
        s += '<img>https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Pertamina_Logo.svg/320px-Pertamina_Logo.svg.png</img>\n';

        // Nomor SPBU (Bold via ESC/POS)
        s += center('\x1b\x45\x01' + nomor_spbu + '\x1b\x45\x00') + '\n';

        // Nama SPBU & Alamat
        s += center(nama_spbu) + '\n';
        s += center(alamat) + '\n';
        s += garis + '\n';

        // Shift, No Trans, Waktu
        s += 'Shift : ' + shift + '   No.Trans: ' + no_trans + '\n';
        s += 'Waktu : ' + waktu + '\n';
        s += garis + '\n';

        // Detail transaksi (titik dua lurus)
        s += rowKolom('Pulau/Pompa', pompa) + '\n';
        s += rowKolom('Nama Produk', produk) + '\n';
        s += rowKolom('Harga/Liter', 'Rp.' + formatRp(harga)) + '\n';
        s += rowKolom('Volume', volume) + '\n';
        s += rowKolom('Total Harga', 'Rp.' + formatRp(total)) + '\n';
        s += rowKolom('Operator', operator) + '\n';
        s += garis + '\n';

        // CASH rata kiri
        s += 'CASH\n';
        s += '\n';

        // No Plat
        s += 'No. Plat : ' + no_plat + '\n';
        s += garis + '\n';

        // Catatan
        if (catatan) {
            s += catatan + '\n';
            s += garis + '\n';
        }

        // Footer
        s += center('Terima Kasih') + '\n';
        s += center('Selamat Jalan') + '\n';
        s += center('Semoga Selamat') + '\n';
        s += center('Sampai Tujuan') + '\n';
        s += '\n\n\n';

        // Kirim ke RawBT
        window.location.href = 'rawbt:base64,' + btoa(unescape(encodeURIComponent(s)));
    }
</script>

</body>
</html>
