<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasir Thermal Ario</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { background: #1557b0; }
        .preview { background: #fff; border: 1px dashed #999; padding: 15px; margin-top: 20px; font-family: 'Courier New', monospace; font-size: 14px; display: none; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>POS Thermal Ario</h2>
    <label>Nama Toko:</label>
    <input type="text" id="toko" value="WARUNG ARIO">
    
    <label>Nama Barang:</label>
    <input type="text" id="barang" placeholder="Contoh: Kopi Gula Aren">
    
    <label>Harga (Rp):</label>
    <input type="number" id="harga" placeholder="15000">
    
    <label>Metode Bayar:</label>
    <select id="metode">
        <option value="TUNAI">TUNAI</option>
        <option value="QRIS">QRIS</option>
        <option value="DEBIT">DEBIT</option>
    </select>

    <button onclick="cetak()">CETAK STRUK</button>
</div>

<div class="footer">Pastikan aplikasi <b>RawBT</b> sudah terinstal & terhubung ke printer.</div>

<script>
    function cetak() {
        const toko = document.getElementById('toko').value.toUpperCase();
        const barang = document.getElementById('barang').value;
        const harga = parseInt(document.getElementById('harga').value || 0);
        const metode = document.getElementById('metode').value;
        const tgl = new Date().toLocaleString('id-ID');

        if (!barang || !harga) {
            alert('Isi nama barang dan harga dulu ya!');
            return;
        }

        const center = (txt) => {
            let space = Math.max(0, Math.floor((32 - txt.length) / 2));
            return " ".repeat(space) + txt;
        };

        const row = (left, right) => {
            let space = 32 - (left.length + right.length);
            return left + " ".repeat(Math.max(1, space)) + right;
        };

        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID').format(angka);
        };

        // Format ESC/POS untuk RawBT
        let s = "";
        s += center(toko) + "\n";
        s += center("Jl. Digital No. 1, Cloud") + "\n";
        s += "--------------------------------\n";
        s += center(tgl) + "\n";
        s += "--------------------------------\n";
        s += row(barang, formatRupiah(harga)) + "\n";
        s += "--------------------------------\n";
        s += row("TOTAL", "Rp " + formatRupiah(harga)) + "\n";
        s += row("BAYAR (" + metode + ")", "Rp " + formatRupiah(harga)) + "\n";
        s += "--------------------------------\n";
        s += center("TERIMA KASIH") + "\n";
        s += center("SUDAH MAMPIR") + "\n\n\n\n";

        // Kirim ke aplikasi RawBT di Android
        window.location.href = "rawbt:base64," + btoa(s);
    }
</script>

</body>
</html>
