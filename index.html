<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Struk Pertamina</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 8px; width: 100%; max-width: 350px; }
        input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; margin-top: 10px; font-weight: bold; }
        .logo-placeholder { text-align: center; font-weight: bold; border: 1px dashed #000; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo-placeholder">[LOGO PERTAMINA]</div>
    <input type="text" id="spbu" value="SPBU 31.XXXXX">
    <input type="text" id="lokasi" value="JL. RAYA XXXXXX">
    <input type="text" id="telp" value="TELP: (021) XXXXXXX">
    <input type="text" id="produk" value="PERTAMAX">
    <input type="number" id="liter" value="10.00">
    <input type="number" id="harga" value="13200">
    <button onclick="cetak()">CETAK STRUK</button>
</div>
<script>
function cetak() {
    const spbu = document.getElementById('spbu').value;
    const lokasi = document.getElementById('lokasi').value;
    const telp = document.getElementById('telp').value;
    const produk = document.getElementById('produk').value;
    const liter = parseFloat(document.getElementById('liter').value);
    const harga = parseInt(document.getElementById('harga').value);
    const total = liter * harga;
    const tgl = new Date().toLocaleString('id-ID');

    const pad = (s, l) => s.padEnd(l);
    const center = (s) => s.padStart((32+s.length)/2).padEnd(32);
    
    let text = center("PERTAMINA") + "\n" +
               center(spbu) + "\n" +
               center(lokasi) + "\n" +
               center(telp) + "\n" +
               "--------------------------------\n" +
               center(tgl) + "\n" +
               "--------------------------------\n" +
               pad("PRODUK:", 10) + produk + "\n" +
               pad("HARGA/L:", 10) + "Rp " + harga.toLocaleString() + "\n" +
               pad("LITER:", 10) + liter.toFixed(2) + "\n" +
               "--------------------------------\n" +
               pad("TOTAL:", 10) + "Rp " + total.toLocaleString() + "\n" +
               "--------------------------------\n" +
               center("TERIMA KASIH") + "\n\n\n\n";

    window.location.href = "rawbt:base64," + btoa(text);
}
</script>
</body>
</html>
